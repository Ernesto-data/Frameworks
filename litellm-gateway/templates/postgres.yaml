apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-postgres-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    app: litellm-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: litellm-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: litellm
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: litellm-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: litellm-postgres
  ports:
    - port: 5432
      targetPort: 5432